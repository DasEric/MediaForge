<!doctype html>
<html lang="{{ ui_language }}" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ _('Setup locked') }} — MediaForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='variables.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}" />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('aw-theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div class="auth-container">
      <div style="margin-bottom:8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px;display:block;margin:0 auto;">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>MediaForge</h1>
      <h2>{{ _('Setup locked') }}</h2>
      <p class="auth-info" style="margin-bottom:16px;">
        {{ _('The setup link is invalid or expired.') }}<br>
        {{ _('Restart the application to get a new token.') }}
      </p>
    </div>
  </body>
</html>
