name: "💡 Feature: Other / General"
description: "Suggest a general feature or improvement that doesn't fit into the other categories."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: "Short Summary"
      description: "What is this feature or improvement about?"
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: "Use Case & Desired Functionality"
      description: "How should this feature work? What would it allow you or others to do?"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "Implementation Ideas or Alternatives"
      description: "Do you have any ideas on how this could be implemented, or alternative approaches?"

  - type: textarea
    id: extra
    attributes:
      label: "Additional Information (optional)"
      description: "Screenshots, examples, links, or any other context."
